<!doctype html>
<html lang="en" ng-app="pumpApp">
  <head>
    <meta charset="UTF-8" />
    <title>Pump Shop - Máy Bơm Chính Hãng</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body ng-app="pumpApp">
    <nav class="navbar navbar-expand-lg navbar-dark glass-nav">
      <div class="container">
        <a class="navbar-brand fw-bold title-gradient" href="#!/">⚙ PUMP SHOP</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="#!/"><i class="bi bi-house"></i> Trang chủ</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#!/lookup"><i class="bi bi-search"></i> Tra cứu đơn</a>
            </li>
          </ul>

          <div class="d-flex align-items-center gap-3">
            <!-- Giỏ hàng -->
            <a href="#!/cart" class="btn btn-outline-light rounded-3 position-relative" style="border-color: rgba(255,255,255,0.2);">
              <i class="bi bi-cart3"></i>
              <span class="badge bg-danger rounded-pill position-absolute" style="top:-6px; right:-6px;">{{cartCount}}</span>
            </a>

            <!-- Chưa đăng nhập -->
            <div ng-if="!isLoggedIn" class="d-flex align-items-center gap-2">
              <a href="#!/login" class="btn btn-outline-light rounded-3" style="border-color: rgba(255,255,255,0.2);">
                <i class="bi bi-box-arrow-in-right me-1"></i>Đăng nhập
              </a>
              <a href="#!/register" class="btn-gradient rounded-3 px-3 py-2 text-decoration-none fw-semibold" style="font-size: 0.9rem;">
                <i class="bi bi-person-plus me-1"></i>Đăng ký
              </a>
            </div>

            <!-- Đã đăng nhập -->
            <div class="dropdown" ng-if="isLoggedIn">
              <button class="btn btn-outline-light rounded-3 dropdown-toggle" type="button" data-bs-toggle="dropdown"
                      style="border-color: rgba(255,255,255,0.2);">
                <i class="bi bi-person-circle me-1"></i>{{currentUser.fullName || currentUser.username}}
              </button>
              <ul class="dropdown-menu dropdown-menu-end" style="background: #1e293b; border: 1px solid rgba(255,255,255,0.1);">
                <li><span class="dropdown-item text-muted small">@{{currentUser.username}}</span></li>
                <li><hr class="dropdown-divider" style="border-color: rgba(255,255,255,0.1);"></li>
                <li>
                  <button class="dropdown-item text-danger" ng-click="logout()">
                    <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                  </button>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <div class="breadcrumb-container border-bottom mb-4" style="background: rgba(0,0,0,0.2);">
      <div class="container py-2">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb mb-0" style="font-size: 0.9rem">
            <li class="breadcrumb-item">
              <a href="#!/" class="text-decoration-none text-muted">Trang chủ</a>
            </li>
            <li class="breadcrumb-item active text-white" ng-if="product.brand">
              {{product.brand}}
            </li>
            <li class="breadcrumb-item active text-white" ng-if="product.name">
              {{product.name}}
            </li>
          </ol>
        </nav>
      </div>
    </div>

    <div class="container mt-4">
      <div ng-view></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
