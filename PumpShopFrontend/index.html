<!doctype html>
<html lang="en" ng-app="pumpApp">
  <head>
    <meta charset="UTF-8" />
    <title>Pump Shop - Máy Bơm Chính Hãng</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body ng-app="pumpApp">
    <header class="header-section border-bottom" style="background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); position: relative; z-index: 1050;">
      <div class="container header-content">
        <!-- Logo -->
        <a class="navbar-brand fw-bold title-gradient fs-3 me-0" href="#!/">
          <i class="bi bi-gear-wide-connected"></i> PUMP SHOP
        </a>

        <!-- Search Bar -->
        <div class="search-bar-wrapper d-none d-lg-block">
          <div class="input-group">
            <span class="input-group-text border-0 bg-dark text-muted" style="border-radius: 12px 0 0 12px;">
              <i class="bi bi-search"></i>
            </span>
            <input type="text" class="form-control glass-input border-0 py-2" placeholder="Tìm kiếm máy bơm, linh kiện..." 
                   ng-model="kw" ng-keypress="($event.which === 13)?search():0" style="border-radius: 0 12px 12px 0 !important;">
          </div>
        </div>

        <!-- Right Icons -->
        <div class="d-flex align-items-center gap-4">
          <a href="#!/cart" class="text-white text-decoration-none d-flex align-items-center gap-2 position-relative">
            <div class="position-relative">
              <i class="bi bi-cart3 fs-4"></i>
              <span class="badge bg-danger rounded-pill position-absolute" style="top:-8px; right:-8px; font-size: 0.65rem;">{{cartCount}}</span>
            </div>
            <span class="d-none d-md-inline fw-medium">Giỏ hàng</span>
          </a>

          <!-- Auth Section -->
          <div ng-if="!isLoggedIn" class="d-flex align-items-center gap-3">
            <a href="#!/login" class="text-white text-decoration-none fw-medium">Đăng nhập</a>
            <a href="#!/register" class="btn-gradient rounded-pill px-4 py-2 text-decoration-none fw-bold">Đăng ký</a>
          </div>

          <!-- User Dropdown -->
          <div class="dropdown" ng-if="isLoggedIn">
            <button class="btn btn-link text-white text-decoration-none dropdown-toggle p-0 d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle fs-4"></i>
              <span class="d-none d-md-inline">{{currentUser.fullName || currentUser.username}}</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0" style="background: #1e293b; border-radius: 12px; min-width: 200px; padding: 0.5rem; z-index: 2000;">
              <li class="px-3 py-2 border-bottom border-secondary mb-2">
                <div class="text-white fw-bold small mb-0">{{currentUser.fullName || currentUser.username}}</div>
                <div class="text-muted" style="font-size: 0.75rem;">@{{currentUser.username}}</div>
              </li>
              <li>
                <a class="dropdown-item rounded-2 py-2" href="#!/profile">
                  <i class="bi bi-person-bounding-box me-2"></i>Trang cá nhân
                </a>
              </li>
              <li><hr class="dropdown-divider bg-secondary"></li>
              <li>
                <button class="dropdown-item text-danger rounded-2 py-2" ng-click="logout()">
                  <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                </button>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent py-0">
      <div class="container">
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link py-3 px-0 me-4 active" href="#!/"><i class="bi bi-grid me-2"></i>Tất cả danh mục</a>
            </li>
            <li class="nav-item">
              <a class="nav-link py-3 px-0 me-4" href="#!/"><i class="bi bi-house me-1"></i>Trang chủ</a>
            </li>
            <li class="nav-item">
              <a class="nav-link py-3 px-0 me-4" href="#!/lookup"><i class="bi bi-search me-1"></i>Tra cứu đơn hàng</a>
            </li>
          </ul>
          <div class="text-white-50 small">
            <i class="bi bi-telephone me-1"></i> Hotline: 1900 6789
          </div>
        </div>
      </div>
    </nav>

    <div class="breadcrumb-container border-bottom mb-4" style="background: rgba(0,0,0,0.2);">
      <div class="container py-2">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb mb-0" style="font-size: 0.9rem">
            <li class="breadcrumb-item">
              <a href="#!/" class="text-decoration-none text-muted">Trang chủ</a>
            </li>
            <li class="breadcrumb-item active text-white" ng-if="product.brand">
              {{product.brand}}
            </li>
            <li class="breadcrumb-item active text-white" ng-if="product.name">
              {{product.name}}
            </li>
          </ol>
        </nav>
      </div>
    </div>

    <div class="container mt-4">
      <div ng-view></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
