<div class="container py-4">
    <div class="row">
        <div class="col-md-7 mb-4">
            <div class="glass-card p-4 p-md-5 border-0">
                <h4 class="fw-bold mb-4 title-gradient"><i class="bi bi-truck"></i> Thông tin giao hàng</h4>
                <form name="checkoutForm">
                    <div class="mb-4 position-relative">
                        <label class="form-label">Họ và tên</label>
                        <input type="text" class="form-control glass-input" ng-model="order.receiverName" placeholder="Nhập tên người nhận" required>
                    </div>
                    <div class="mb-4 position-relative">
                        <label class="form-label">Số điện thoại</label>
                        <input type="tel" class="form-control glass-input" ng-model="order.receiverPhone" placeholder="Số điện thoại liên hệ" required>
                    </div>
                    <div class="mb-4 position-relative">
                        <label class="form-label">Địa chỉ nhận hàng</label>
                        <textarea class="form-control glass-input" rows="4" ng-model="order.deliveryAddress" placeholder="Ghi rõ số nhà, đường, xã/phường, quận/huyện, tỉnh/thành phố" required></textarea>
                    </div>
                </form>
            </div>
        </div>

        <div class="col-md-5">
            <div class="glass-card p-4 border-0">
                <h4 class="fw-bold mb-4 title-gradient"><i class="bi bi-bag-check"></i> Đơn hàng của bạn</h4>
                
                <div class="mb-4" style="max-height: 300px; overflow-y: auto;">
                    <div ng-repeat="item in cart" class="d-flex justify-content-between mb-3 border-bottom pb-3" style="border-color: rgba(255,255,255,0.05) !important;">
                        <div class="d-flex align-items-center">
                            <span class="badge bg-secondary me-2" style="background: rgba(255,255,255,0.1) !important;">{{item.quantityInCart}}x</span>
                            <span class="text-white">{{item.name}}</span>
                        </div>
                        <span style="color: var(--text-muted);">{{(item.price * item.quantityInCart) | number:0}} đ</span>
                    </div>
                </div>

                <div class="d-flex justify-content-between h5 fw-bold mt-4 pt-3 border-top" style="border-color: rgba(255,255,255,0.1) !important;">
                    <span class="text-white">Tổng thanh toán:</span>
                    <span style="color: var(--accent);">{{totalAmount | number:0}} đ</span>
                </div>

                <button class="btn-gradient w-100 py-3 rounded-3 fw-bold mt-4 text-uppercase" 
                    ng-click="confirmOrder()"
                    ng-disabled="checkoutForm.$invalid"
                    style="font-size: 1.1rem; letter-spacing: 1px;">
                    <i class="bi bi-check-circle me-2"></i> Xác nhận đặt hàng
                </button>
            </div>
        </div>
    </div>
</div>
