<div class="row">
    <div class="col-md-3 mb-4">
        <div class="list-group mb-4" style="background: transparent;">
            <button class="list-group-item list-group-item-action list-group-item-glass active border-0 rounded-top">
                <i class="bi bi-grid"></i> Danh mục
            </button>
            <button class="list-group-item list-group-item-action list-group-item-glass border-0" ng-repeat="c in categories">
                {{c.name}}
            </button>
        </div>

        <div class="glass-card p-0 overflow-hidden">
            <div class="p-3 border-bottom" style="background: rgba(255,255,255,0.05);">
                <h5 class="mb-0 title-gradient"><i class="bi bi-funnel"></i> Bộ lọc nâng cao</h5>
            </div>
            <div class="p-4">
                <div class="mb-4">
                    <label class="form-label">Tìm kiếm tên/mô tả:</label>
                    <div class="input-group">
                        <input type="text" class="form-control glass-input border-0" ng-model="kw" 
                               placeholder="Nhập từ khóa..." ng-keypress="($event.which === 13)?search():0">
                        <button class="btn btn-gradient border-0" ng-click="search()">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Thương hiệu:</label>
                    <select class="form-select glass-input border-0" ng-model="filterData.brand">
                        <option value="" class="text-dark">-- Tất cả các hãng --</option>
                        <option value="Pentax" class="text-dark">Pentax</option>
                        <option value="Ebara" class="text-dark">Ebara</option>
                        <option value="Panasonic" class="text-dark">Panasonic</option>
                        <option value="Wilo" class="text-dark">Wilo</option>
                        <option value="Hanil" class="text-dark">Hanil</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">Công suất tối đa (kW):</label>
                    <div class="input-group">
                        <input type="number" class="form-control glass-input border-0" ng-model="filterData.kw" placeholder="0.00" step="0.01" />
                        <span class="input-group-text border-0" style="background: rgba(255,255,255,0.1); color: #fff;">kW</span>
                    </div>
                </div>

                <button class="btn btn-outline-light w-100 rounded-3" ng-click="kw=''; filterData = {}; search()">
                    <i class="bi bi-trash"></i> Làm mới bộ lọc
                </button>
            </div>
        </div>
    </div>

    <div class="col-md-9">
        <div class="alert mb-4 border-0 d-flex justify-content-between align-items-center" 
             style="background: rgba(56, 189, 248, 0.1); color: var(--accent);">
            <span><i class="bi bi-info-circle"></i> Hiển thị sản phẩm theo trang (Server-side)</span>
            <span class="badge bg-info text-dark">Trang {{pager.page + 1}} / {{pager.count}}</span>
        </div>

        <div class="row">
            <div class="col-md-4 mb-4" ng-repeat="p in pager.items">
                <div class="glass-card glass-card-hover h-100 d-flex flex-column p-0 overflow-hidden">
                    <div style="background: #fff; padding: 20px; text-align: center; cursor: pointer;" ng-click="goToDetail(p.id)">
                        <img ng-src="{{p.image}}" class="img-fluid" alt="{{p.name}}" style="height: 150px; object-fit: contain;" />
                    </div>
                    <div class="p-4 d-flex flex-column flex-grow-1">
                        <h6 class="text-muted mb-1">{{p.brand}}</h6>
                        <h5 class="mb-3 text-white" style="font-size: 1.05rem; height: 3rem; overflow: hidden;">
                            {{p.name}}
                        </h5>
                        <p class="fw-bold mb-4" style="color: var(--accent); font-size: 1.2rem;">{{p.price | number}} VNĐ</p>
                        
                        <div class="mt-auto d-flex flex-column gap-2">
                            <button class="btn btn-outline-light w-100 rounded-3" ng-click="goToDetail(p.id)">
                                Xem chi tiết
                            </button>
                            <button class="btn btn-gradient w-100 rounded-3" ng-click="addToCart(p)">
                                <i class="bi bi-cart-plus"></i> Chọn mua
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-center mt-4 mb-5" ng-if="pager.count > 0">
            <nav>
                <ul class="pagination pagination-glass">
                    <li class="page-item" ng-class="{disabled: pager.page == 0}">
                        <a class="page-link" ng-click="pager.first()"><i class="bi bi-chevron-double-left"></i></a>
                    </li>
                    <li class="page-item" ng-class="{disabled: pager.page == 0}">
                        <a class="page-link" ng-click="pager.prev()"><i class="bi bi-chevron-left"></i></a>
                    </li>
                    
                    <li class="page-item active">
                        <span class="page-link">{{pager.page + 1}}</span>
                    </li>

                    <li class="page-item" ng-class="{disabled: pager.page >= pager.count - 1}">
                        <a class="page-link" ng-click="pager.next()"><i class="bi bi-chevron-right"></i></a>
                    </li>
                    <li class="page-item" ng-class="{disabled: pager.page >= pager.count - 1}">
                        <a class="page-link" ng-click="pager.last()"><i class="bi bi-chevron-double-right"></i></a>
                    </li>
                </ul>
            </nav>
        </div>
        
        <div class="text-center py-5" ng-if="pager.items.length == 0">
            <i class="bi bi-search" style="font-size: 3rem; color: rgba(255,255,255,0.2);"></i>
            <h4 class="mt-3 text-muted">Không tìm thấy sản phẩm nào phù hợp</h4>
        </div>
    </div>
</div>
