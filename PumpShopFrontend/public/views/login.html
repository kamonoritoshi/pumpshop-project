<div class="row justify-content-center py-4">
    <div class="col-md-5">
        <div class="glass-card p-5">
            <div class="text-center mb-5">
                <div style="background: linear-gradient(135deg, #4F46E5, #38bdf8); width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                    <i class="bi bi-person-circle text-white" style="font-size: 2rem;"></i>
                </div>
                <h2 class="title-gradient fw-bold">Đăng nhập</h2>
                <p class="text-muted">Chào mừng bạn quay trở lại PUMP SHOP</p>
            </div>

            <form ng-submit="login()" novalidate>
                <div class="mb-4">
                    <label class="form-label" for="login-username">Tên đăng nhập</label>
                    <div class="input-group">
                        <span class="input-group-text border-0" style="background: rgba(255,255,255,0.06); color: var(--text-muted);">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text" id="login-username" class="form-control glass-input border-0"
                               ng-model="credentials.username" placeholder="Nhập tên đăng nhập" required autofocus>
                    </div>
                </div>

                <div class="mb-5">
                    <label class="form-label" for="login-password">Mật khẩu</label>
                    <div class="input-group">
                        <span class="input-group-text border-0" style="background: rgba(255,255,255,0.06); color: var(--text-muted);">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" id="login-password" class="form-control glass-input border-0"
                               ng-model="credentials.password" placeholder="Nhập mật khẩu" required>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe" ng-model="rememberMe" style="cursor: pointer;">
                        <label class="form-check-label text-muted small" for="rememberMe" style="cursor: pointer;">
                            Ghi nhớ tên đăng nhập
                        </label>
                    </div>
                </div>

                <div class="alert border-0 mb-4" ng-show="errorMessage"
                     style="background: rgba(239, 68, 68, 0.12); color: #fca5a5; border-left: 4px solid var(--danger) !important;">
                    <i class="bi bi-exclamation-circle me-2"></i>{{errorMessage}}
                </div>

                <button type="submit" class="btn-gradient w-100 py-3 rounded-3 fw-bold fs-6"
                        ng-disabled="isLoading">
                    <span ng-hide="isLoading"><i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập</span>
                    <div ng-show="isLoading" class="spinner" style="display: block; margin: auto;"></div>
                </button>
            </form>

            <div class="text-center mt-4 pt-4 border-top" style="border-color: rgba(255,255,255,0.1) !important;">
                <p class="text-muted mb-0">Chưa có tài khoản?
                    <a href="#!/register" class="text-decoration-none fw-semibold" style="color: var(--accent);">Đăng ký ngay</a>
                </p>
            </div>
        </div>
    </div>
</div>
